<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIOHOS | Secure Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background-color: #f4f7fa; /* Clean light grey/blue */
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #1e293b;
        }

        .login-card {
            background: #ffffff;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.04);
            width: 100%;
            max-width: 420px;
            border: 1px solid #e2e8f0;
        }

        .header {
            text-align: center;
            margin-bottom: 32px;
        }

        /* Minimalist AI Logo */
        .logo-box {
            width: 50px;
            height: 50px;
            background: #0f172a;
            color: #38bdf8;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 22px;
            margin: 0 auto 15px;
        }

        .header h1 {
            font-size: 26px;
            font-weight: 700;
            margin: 0;
            letter-spacing: -0.5px;
            color: #0f172a;
        }

        .header p {
            font-size: 13px;
            color: #64748b;
            margin-top: 5px;
            line-height: 1.5;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
            color: #334155;
        }

        input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #cbd5e1;
            border-radius: 10px;
            font-size: 15px;
            transition: all 0.2s;
            background-color: #f8fafc;
        }

        input:focus {
            outline: none;
            border-color: #38bdf8;
            background-color: #ffffff;
            box-shadow: 0 0 0 4px rgba(56, 189, 248, 0.1);
        }

        .btn-login {
            width: 100%;
            background-color: #0f172a;
            color: white;
            padding: 14px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 10px;
        }

        .btn-login:hover {
            background-color: #1e293b;
        }

        .error-message {
            background: #fef2f2;
            color: #dc2626;
            padding: 10px;
            border-radius: 8px;
            font-size: 13px;
            margin-top: 15px;
            border: 1px solid #fee2e2;
            text-align: center;
        }

        .ai-status {
            margin-top: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 12px;
            font-weight: 600;
            color: #0ea5e9;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .pulse {
            width: 8px;
            height: 8px;
            background: #0ea5e9;
            border-radius: 50%;
            box-shadow: 0 0 0 rgba(14, 165, 233, 0.4);
            animation: pulse-animation 2s infinite;
        }

        @keyframes pulse-animation {
            0% { box-shadow: 0 0 0 0px rgba(14, 165, 233, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(14, 165, 233, 0); }
            100% { box-shadow: 0 0 0 0px rgba(14, 165, 233, 0); }
        }
    </style>
</head>
<body>

<div class="login-card">
    <div class="header">
        <div class="logo-box">A</div>
        <h1>AIOHOS</h1>
        <p>Autonomous Intelligent Orchestrated<br>Hospital Operating System</p>
    </div>

    <form method="POST">
        {% csrf_token %}
        <div class="form-group">
            <label>Username</label>
            <input type="text" name="username" placeholder="Staff ID or Username" required>
        </div>

        <div class="form-group">
            <label>Password</label>
            <input type="password" name="password" placeholder="••••••••" required>
        </div>
        
        <button type="submit" class="btn-login">
            Login
        </button>
    </form>

    {% if messages %}
        {% for message in messages %}
            <div class="error-message">{{ message }}</div>
        {% endfor %}
    {% endif %}

    <div class="ai-status">
        <div class="pulse"></div>
        AI Flow Optimization Active
    </div>
</div>

</body>
</html>

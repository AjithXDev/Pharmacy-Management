{% extends 'base.html' %}
{% block title %}Token Analytics{% endblock %}

{% block content %}

<h1 style="margin-bottom:30px;">Token Analytics Panel</h1>

<!-- 🔷 DAILY TREND -->
<div class="card" style="margin-bottom:30px;">
    <h3 style="margin-bottom:20px;">Daily Token Count (Last 7 Days)</h3>
    <canvas id="dailyChart"></canvas>
</div>

<!-- 🔷 WEEKLY TREND + HOURLY -->
<div style="display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-bottom:30px;">

    <div class="card">
        <h3 style="margin-bottom:20px;">Hourly Distribution (Today)</h3>
        <canvas id="hourChart"></canvas>
    </div>

    <div class="card">
        <h3 style="margin-bottom:20px;">Pharmacy Comparison</h3>
        <canvas id="pharmacyChart"></canvas>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>

/* 🔷 Daily Line Chart */
new Chart(document.getElementById('dailyChart'), {
    type: 'line',
    data: {
        labels: {{ daily_labels|safe }},
        datasets: [{
            label: 'Tokens',
            data: {{ daily_counts|safe }},
            borderColor: '#0284c7',
            backgroundColor: 'rgba(2,132,199,0.1)',
            fill: true,
            tension: 0.4
        }]
    },
    options: {
        responsive: true,
        plugins: { legend: { display: false } }
    }
});

/* 🔷 Hourly Bar Chart */
new Chart(document.getElementById('hourChart'), {
    type: 'bar',
    data: {
        labels: {{ hour_labels|safe }},
        datasets: [{
            label: 'Tokens',
            data: {{ hour_counts|safe }},
            backgroundColor: '#38bdf8',
            borderRadius: 6
        }]
    },
    options: {
        responsive: true,
        plugins: { legend: { display: false } },
        scales: {
            y: { beginAtZero: true }
        }
    }
});

/* 🔷 Pharmacy Comparison Chart */
new Chart(document.getElementById('pharmacyChart'), {
    type: 'bar',
    data: {
        labels: {{ pharmacy_labels|safe }},
        datasets: [{
            label: 'Total Tokens',
            data: {{ pharmacy_counts|safe }},
            backgroundColor: '#0ea5e9',
            borderRadius: 6
        }]
    },
    options: {
        responsive: true,
        indexAxis: 'y',
        plugins: { legend: { display: false } }
    }
});

</script>

{% endblock %}

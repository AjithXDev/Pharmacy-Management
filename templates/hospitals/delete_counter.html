{% extends 'base.html' %}
{% block title %}Delete Counter{% endblock %}

{% block content %}

<h2 style="color:#dc2626;">
    Delete Counter {{ counter.counter_number }}
</h2>

<div class="card" style="max-width:400px;">

    <p>Are you sure? This cannot be undone.</p>

    <form method="POST">
        {% csrf_token %}
        <button type="submit"
                class="btn btn-primary"
                style="background:#dc2626;">
            Confirm Delete
        </button>

        <a href="{% url 'all_counters' %}"
           class="btn btn-outline">
           Cancel
        </a>
    </form>

</div>

{% endblock %}

{% extends 'base.html' %}
{% block title %}Edit Counter{% endblock %}

{% block content %}

<h2>Edit Counter - {{ counter.counter_number }}</h2>

<div class="card" style="max-width:400px;">
<form method="POST">
    {% csrf_token %}

    <label>Counter Number</label>
    <input type="number"
           name="counter_number"
           value="{{ counter.counter_number }}"
           required
           style="width:100%; padding:10px; margin-bottom:20px;">

    <button type="submit" class="btn btn-primary">
        Update Counter
    </button>
</form>
</div>

{% endblock %}
